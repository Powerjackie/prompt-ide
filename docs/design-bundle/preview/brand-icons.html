<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:grid;grid-template-columns:repeat(8,1fr);gap:14px 18px;align-items:center;justify-items:center;}
  .ic{color:var(--ink-muted);display:flex;flex-direction:column;align-items:center;gap:5px;}
  .n{font-family:var(--font-mono);font-size:9.5px;color:var(--ink-soft);letter-spacing:.04em;}
  svg{stroke:currentColor;fill:none;stroke-width:1.25;stroke-linecap:round;stroke-linejoin:round;}
</style></head><body>
<div class="card">
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M3 12l2-2 4 4 8-8 4 4"/></svg><span class="n">activity</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg><span class="n">file-text</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M9 3v2M15 3v2M9 19v2M15 19v2M6 9H4M6 15H4M20 9h-2M20 15h-2"/><rect x="6" y="6" width="12" height="12" rx="2"/></svg><span class="n">flask</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 20l9-16H3z"/></svg><span class="n">triangle</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg><span class="n">book</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg><span class="n">bookmark</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M12 2l3 7 7 1-5 5 1 7-6-3-6 3 1-7-5-5 7-1z"/></svg><span class="n">star</span></div>
  <div class="ic"><svg width="22" height="22" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg><span class="n">message</span></div>
</div>
</body></html>
