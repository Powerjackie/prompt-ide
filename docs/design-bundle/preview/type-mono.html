<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:10px;}
  .m{font-family:var(--font-mono);color:var(--ink);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:.04em;}
  pre{margin:0;}
</style></head><body>
<div class="card">
  <div class="m" style="font-size:28px;font-weight:600;">JetBrains Mono</div>
  <pre class="m" style="font-size:13px;line-height:1.55;background:var(--paper-deep);padding:10px 12px;border:1px solid var(--rule-fine);border-radius:5px;">const brief = {
  mode:    "stateless",
  surface: "playground",
  risk:    <span style="color:#547265">"low"</span>,
};</pre>
  <div class="lbl">code · metadata values · kbd · labels. Never used for body prose.</div>
</div>
</body></html>
