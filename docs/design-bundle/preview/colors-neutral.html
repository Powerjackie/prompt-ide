<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
  .swatches{display:flex;gap:0;border:1px solid var(--rule-fine);border-radius:5px;overflow:hidden;}
  .sw{flex:1;height:68px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:var(--ivory);font-family:var(--font-mono);font-size:10px;line-height:1.3;}
  .sw .name{font-weight:600;letter-spacing:.04em;}
  .sw .hex{opacity:.85;}
  .sw.light{color:var(--ink);}
  .label{font-family:var(--font-body);font-size:11px;color:var(--ink-muted);letter-spacing:.04em;}
</style></head><body>
<div class="card">
  <div class="swatches">
    <div class="sw"        style="background:#F4EFE3" class="sw light"><span class="name">paper</span><span class="hex">#F4EFE3</span></div>
    <div class="sw light"  style="background:#FAF6EB"><span class="name">ivory</span><span class="hex">#FAF6EB</span></div>
    <div class="sw light"  style="background:#EDE6D3"><span class="name">paper-deep</span><span class="hex">#EDE6D3</span></div>
    <div class="sw"        style="background:#1A2C2A"><span class="name">ink</span><span class="hex">#1A2C2A</span></div>
    <div class="sw"        style="background:#5C6B68"><span class="name">ink-muted</span><span class="hex">#5C6B68</span></div>
    <div class="sw light"  style="background:#8A9490"><span class="name">ink-soft</span><span class="hex">#8A9490</span></div>
  </div>
  <div class="label">Neutral ladder — warm paper whites to ink green-black. Ink is never pure black.</div>
</div>
</body></html>
