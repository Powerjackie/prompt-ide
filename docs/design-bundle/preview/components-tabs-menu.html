<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:10px;}
  .bar{display:flex;gap:4px;padding:4px;background:var(--paper-deep);border:1px solid var(--rule-fine);border-radius:6px;width:max-content;}
  .tab{font-family:var(--font-sans);font-size:12px;font-weight:500;padding:6px 12px;border-radius:4px;color:var(--ink-muted);cursor:pointer;}
  .tab.active{background:var(--ivory);color:var(--ink);box-shadow:0 1px 0 rgba(26,44,42,.06),0 1px 2px rgba(26,44,42,.04);}
  .menu{background:var(--ivory);border:1px solid var(--rule-fine);border-radius:5px;padding:4px;box-shadow:0 1px 0 rgba(26,44,42,.06),0 4px 10px rgba(26,44,42,.06);width:220px;}
  .item{font-family:var(--font-sans);font-size:13px;color:var(--ink);padding:6px 10px;border-radius:4px;display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .item.active{background:var(--verdigris-wash);color:var(--verdigris-deep);}
  .item:hover{background:var(--paper-deep);}
  .item .kbd{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);border:1px solid var(--rule-fine);border-bottom-width:2px;border-radius:3px;padding:0 5px;background:var(--ivory);}
  .row{display:flex;gap:16px;align-items:flex-start;}
</style></head><body>
<div class="card">
  <div class="row">
    <div class="bar">
      <span class="tab active">Preview</span>
      <span class="tab">Agent</span>
      <span class="tab">Versions</span>
      <span class="tab">Modules</span>
    </div>
    <div class="menu">
      <div class="item active"><span>Run analysis</span><span class="kbd">⌘↵</span></div>
      <div class="item"><span>Copy prompt</span><span class="kbd">⌘C</span></div>
      <div class="item"><span>Set as baseline</span><span class="kbd">B</span></div>
      <div class="item" style="color:var(--vermillion);"><span>Delete forever</span></div>
    </div>
  </div>
</div>
</body></html>
