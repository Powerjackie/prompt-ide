<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;gap:22px;align-items:center;}
  .mark{flex-shrink:0;}
  .wm{flex:1;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:.04em;margin-top:6px;}
</style></head><body>
<div class="card">
  <div class="mark"><img src="../assets/logo-monogram.svg" width="64" height="64" alt=""><div class="lbl" style="text-align:center;margin-top:8px;">monogram</div></div>
  <div class="wm"><img src="../assets/logo-wordmark.svg" width="320" height="64" alt=""><div class="lbl">wordmark · Source Serif 4 · verdigris dot separator</div></div>
</div>
</body></html>
