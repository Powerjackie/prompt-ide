<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;}
  .nav{display:flex;flex-direction:column;gap:2px;border:1px solid var(--rule-fine);border-radius:5px;background:var(--ivory);padding:8px;width:260px;}
  .n{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:4px;font-family:var(--font-sans);font-size:13px;color:var(--ink-muted);cursor:pointer;}
  .n:hover{background:var(--paper-deep);color:var(--ink);}
  .n.active{background:var(--verdigris-wash);color:var(--verdigris-deep);font-weight:500;position:relative;}
  .n.active::before{content:"";position:absolute;left:-8px;top:8px;bottom:8px;width:2px;background:var(--verdigris);}
  .ic{width:14px;height:14px;border:1.25px solid currentColor;border-radius:3px;flex-shrink:0;}
  .meta{margin-left:auto;font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);}
</style></head><body>
<div class="card">
  <div class="nav">
    <div class="n"><span class="ic"></span>Home</div>
    <div class="n active"><span class="ic"></span>Playground<span class="meta">⌘2</span></div>
    <div class="n"><span class="ic"></span>Prompts<span class="meta">142</span></div>
    <div class="n"><span class="ic"></span>Editor</div>
    <div class="n"><span class="ic"></span>Modules<span class="meta">23</span></div>
    <div class="n"><span class="ic"></span>Docs</div>
  </div>
</div>
</body></html>
