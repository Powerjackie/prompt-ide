<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:8px;}
  .b{font-family:var(--font-sans);color:var(--ink);}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:.04em;}
</style></head><body>
<div class="card">
  <div class="b" style="font-size:34px;font-weight:500;letter-spacing:-0.01em;">IBM Plex Sans</div>
  <div class="b" style="font-size:17px;line-height:1.55;">The UI voice — Swiss-engineering precision. Pairs with the serif without competing. Weights 400–600.</div>
  <div class="b" style="font-size:13px;color:var(--ink-muted);">Secondary / meta UI copy sits in ink-muted at 13px.</div>
  <hr class="rule">
  <div class="lbl">regular 400 &nbsp;·&nbsp; medium 500 &nbsp;·&nbsp; semibold 600 &nbsp;·&nbsp; never 700+</div>
</div>
</body></html>
