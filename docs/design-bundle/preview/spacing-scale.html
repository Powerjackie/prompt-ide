<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:10px;font-family:var(--font-mono);color:var(--ink);}
  .row{display:flex;align-items:center;gap:16px;}
  .bar{background:var(--verdigris-wash);height:14px;border-radius:2px;}
  .k{width:58px;font-size:10px;color:var(--ink-muted);letter-spacing:.04em;}
  .v{width:44px;font-size:10px;color:var(--ink-soft);text-align:right;}
</style></head><body>
<div class="card">
  <div class="row"><div class="k">space-1</div><div class="bar" style="width:4px;"></div><div class="v">4</div></div>
  <div class="row"><div class="k">space-2</div><div class="bar" style="width:8px;"></div><div class="v">8</div></div>
  <div class="row"><div class="k">space-3</div><div class="bar" style="width:12px;"></div><div class="v">12</div></div>
  <div class="row"><div class="k">space-4</div><div class="bar" style="width:16px;"></div><div class="v">16</div></div>
  <div class="row"><div class="k">space-5</div><div class="bar" style="width:20px;"></div><div class="v">20</div></div>
  <div class="row"><div class="k">space-6</div><div class="bar" style="width:24px;"></div><div class="v">24</div></div>
  <div class="row"><div class="k">space-8</div><div class="bar" style="width:32px;"></div><div class="v">32</div></div>
  <div class="row"><div class="k">space-10</div><div class="bar" style="width:40px;"></div><div class="v">40</div></div>
  <div class="row"><div class="k">space-12</div><div class="bar" style="width:48px;"></div><div class="v">48</div></div>
  <div class="row"><div class="k">space-16</div><div class="bar" style="width:64px;"></div><div class="v">64</div></div>
</div>
</body></html>
