<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:10px;}
  .spec{font-family:var(--font-serif);color:var(--ink);line-height:1.1;letter-spacing:-0.02em;font-weight:600;font-size:52px;}
  .row{display:flex;gap:14px;align-items:baseline;}
  .row .s{font-family:var(--font-serif);color:var(--ink);font-weight:600;}
  .row .lbl{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:.04em;}
</style></head><body>
<div class="card">
  <div class="spec">Source Serif 4</div>
  <div class="row"><span class="s" style="font-size:34px;letter-spacing:-0.01em;">Scholarly, transitional, quiet.</span></div>
  <div class="row"><span class="s" style="font-size:20px;">Headings, prose, long-form prompt content.</span></div>
  <hr class="rule">
  <div class="row">
    <div class="lbl">400</div><div class="lbl">500</div><div class="lbl">600</div>
    <div class="lbl" style="margin-left:auto;">natural case only · never uppercase · 600 is the ceiling</div>
  </div>
</div>
</body></html>
