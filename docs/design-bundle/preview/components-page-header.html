<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:flex;flex-direction:column;gap:14px;}
  .eyebrow{font-family:var(--font-sans);font-size:10px;font-weight:500;letter-spacing:.08em;color:var(--ink-muted);font-variant-caps:all-small-caps;}
  .h{font-family:var(--font-serif);font-size:28px;font-weight:600;color:var(--ink);letter-spacing:-0.02em;margin:0;}
  .sub{font-family:var(--font-serif);font-size:15px;line-height:1.6;color:var(--ink-muted);margin:0;max-width:54ch;}
  .row{display:flex;gap:24px;padding-top:10px;border-top:1px solid var(--rule-fine);align-items:baseline;}
  .m{font-family:var(--font-mono);font-size:10.5px;color:var(--ink-muted);letter-spacing:.04em;}
  .m strong{font-family:var(--font-serif);font-weight:600;color:var(--ink);font-size:14px;display:block;margin-top:2px;}
</style></head><body>
<div class="card">
  <span class="eyebrow">prompt operations</span>
  <h1 class="h">Draft hard. Keep the good copy.</h1>
  <p class="sub">Private workbench. Move from capture to analysis, refactor, benchmark, and packaging in one place.</p>
  <div class="row">
    <div class="m">mode<strong>author / test / release</strong></div>
    <div class="m">surface<strong>playground · library · modules</strong></div>
    <div class="m">rule<strong>keep the good copy</strong></div>
  </div>
</div>
</body></html>
