<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:22px 26px;display:grid;grid-template-columns:72px 1fr 90px;gap:8px 16px;align-items:baseline;}
  .sz{font-family:var(--font-mono);font-size:10px;color:var(--ink-muted);letter-spacing:.04em;}
  .s{font-family:var(--font-serif);color:var(--ink);font-weight:600;letter-spacing:-0.01em;}
  .w{font-family:var(--font-mono);font-size:10px;color:var(--ink-soft);letter-spacing:.04em;text-align:right;}
</style></head><body>
<div class="card">
  <div class="sz">48 / 1.15</div><div class="s" style="font-size:48px;">Page title</div><div class="w">h1 · 600</div>
  <div class="sz">30 / 1.30</div><div class="s" style="font-size:30px;">Section header</div><div class="w">h2 · 600</div>
  <div class="sz">20 / 1.30</div><div class="s" style="font-size:20px;">Subsection</div><div class="w">h3 · 600</div>
  <div class="sz">17 / 1.70</div><div class="s" style="font-size:17px;font-weight:400;font-family:var(--font-serif);">Long-form prose, rendered in the serif.</div><div class="w">prose · 400</div>
  <div class="sz">15 / 1.55</div><div class="s" style="font-size:15px;font-weight:400;font-family:var(--font-sans);">UI body copy sits in Plex Sans.</div><div class="w">body · 400</div>
  <div class="sz">11 / 1.45</div><div class="s" style="font-size:11px;font-weight:500;font-family:var(--font-sans);color:var(--ink-muted);letter-spacing:.02em;">marginalia · quiet metadata</div><div class="w">meta · 500</div>
</div>
</body></html>
