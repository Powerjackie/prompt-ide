<!doctype html><html><head><meta charset="utf-8"><title>Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--paper);}
  .card{padding:20px 24px;display:flex;flex-direction:column;gap:12px;}
  .swatches{display:flex;gap:0;border:1px solid var(--rule-fine);border-radius:5px;overflow:hidden;}
  .sw{flex:1;height:68px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;color:var(--ivory);font-family:var(--font-mono);font-size:10px;line-height:1.3;}
  .sw .name{font-weight:600;letter-spacing:.04em;}
  .sw.light{color:var(--ink);}
  .label{font-family:var(--font-body);font-size:11px;color:var(--ink-muted);letter-spacing:.04em;}
</style></head><body>
<div class="card">
  <div class="swatches">
    <div class="sw"       style="background:#6B9080"><span class="name">verdigris</span><span>#6B9080</span></div>
    <div class="sw"       style="background:#547265"><span class="name">verdigris-deep</span><span>#547265</span></div>
    <div class="sw light" style="background:#E4ECE7"><span class="name">verdigris-wash</span><span>#E4ECE7</span></div>
    <div class="sw"       style="background:#C44E2C"><span class="name">vermillion</span><span>#C44E2C</span></div>
    <div class="sw light" style="background:#F4E0D8"><span class="name">vermillion-wash</span><span>#F4E0D8</span></div>
    <div class="sw light" style="background:#B89868"><span class="name">amber-rule</span><span>#B89868</span></div>
  </div>
  <div class="label">Accents — oxidized copper green (primary), proofreading red (sparingly), archival amber (rules &amp; link underlines).</div>
</div>
</body></html>
