<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Prompt IDE — UI Kit</title>
  <link rel="stylesheet" href="../../colors_and_type.css"/>
  <style>
    html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);height:100%;}
    #app{min-height:100vh;}
    .shell{display:flex;height:100vh;}
    .main{flex:1;display:flex;flex-direction:column;min-width:0;}
    .body{flex:1;overflow:auto;padding:32px;}
    *, *::before, *::after { box-sizing: border-box; }
    input, textarea, button { font-family: inherit; }
    button:focus-visible, input:focus-visible, textarea:focus-visible {
      outline: 2px solid var(--verdigris); outline-offset: 2px;
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="app"></div>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="primitives.jsx"></script>
  <script type="text/babel" src="chrome.jsx"></script>
  <script type="text/babel" src="home.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>
  <script type="text/babel" data-presets="react">
    function App() {
      const [route, setRoute] = React.useState("home");
      if (route === "login") {
        return (
          <div>
            <LoginScreen/>
            <button onClick={() => setRoute("home")} style={{
              position: "fixed", top: 16, right: 16, zIndex: 10,
              fontFamily: "var(--font-sans)", fontSize: 12,
              padding: "6px 12px", background: "var(--ivory)", color: "var(--ink)",
              border: "1px solid var(--rule-fine)", borderRadius: 4, cursor: "pointer",
            }}>← Back to app</button>
          </div>
        );
      }

      const titleMap = {
        home: { t: "Prompt Operations", e: "home" },
        playground: { t: "Agent Playground", e: "playground" },
        prompts: { t: "Prompts", e: "library" },
        editor: { t: "Senior writing assistant", e: "workspace" },
        modules: { t: "Modules", e: "modules" },
        docs: { t: "Docs", e: "docs" },
      };
      const meta = titleMap[route] || titleMap.home;

      return (
        <div className="shell">
          <Sidebar active={route} onNav={setRoute}/>
          <div className="main">
            <TopBar title={meta.t} eyebrow={meta.e}/>
            <div className="body">
              {route === "home" && <HomeScreen onNav={setRoute}/>}
              {route === "prompts" && <PromptsScreen onNav={setRoute}/>}
              {route === "editor" && <EditorScreen onNav={setRoute}/>}
              {route === "playground" && <PlaygroundScreen/>}
              {route === "modules" && <ModulesScreen/>}
              {route === "docs" && (
                <div style={{ maxWidth: 680, margin: "0 auto" }}>
                  <PageHeader eyebrow="reference" title="Docs" description="In-app documentation lives on this page. Placeholder content in the UI kit."/>
                  <p style={{ fontFamily: "var(--font-serif)", fontSize: 17, lineHeight: 1.7, color: "var(--ink)" }}>
                    Prompt IDE is a private prompt R&amp;D workbench for one operator. This document is a placeholder that stands in for the real docs surface during design review.
                  </p>
                </div>
              )}
            </div>
            <footer style={{ borderTop: "1px solid var(--rule-fine)", padding: "10px 24px", display: "flex", justifyContent: "space-between", fontFamily: "var(--font-mono)", fontSize: 10, color: "var(--ink-soft)", letterSpacing: "0.04em" }}>
              <span>Lab Notebook / Accepted</span>
              <span>
                <button onClick={() => setRoute("login")} style={{ border: "none", background: "transparent", color: "var(--ink-muted)", fontFamily: "inherit", fontSize: "inherit", cursor: "pointer", textDecoration: "underline", textDecorationColor: "var(--amber-rule)", textUnderlineOffset: 3 }}>View login screen</button>
                &nbsp; · Home + Playground + Library / Live
              </span>
            </footer>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("app"));
    root.render(<App/>);
  </script>
</body>
</html>
